<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cat Facts API</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, Helvetica, sans-serif;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            background:
            url('https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1974&auto=format&fit=crop')
            center/cover no-repeat;
        }

        .overlay {

            position: absolute;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0.65);

            backdrop-filter: blur(4px);
        }

        .container {

            position: relative;

            z-index: 10;

            width: 450px;

            background: rgba(18,18,18,0.88);

            border-radius: 25px;

            padding: 35px;

            text-align: center;

            color: white;

            box-shadow:
            0 0 40px rgba(0,0,0,0.7);

            animation: aparecer 1s ease;
        }

        @keyframes aparecer {

            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {

            font-size: 32px;

            margin-bottom: 10px;
        }

        .subtitulo {

            color: #bdbdbd;

            margin-bottom: 25px;

            line-height: 24px;
        }

        .status {

            color: #57ff8f;

            font-size: 14px;

            margin-bottom: 25px;
        }

        .card-curiosidade {

            background: rgba(255,255,255,0.05);

            padding: 25px;

            border-radius: 18px;

            min-height: 180px;

            display: flex;

            flex-direction: column;

            justify-content: center;
        }

        .titulo {

            font-size: 22px;

            margin-bottom: 20px;
        }

        #curiosidade {

            line-height: 30px;

            font-size: 18px;

            color: #e5e5e5;
        }

        button {

            margin-top: 30px;

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(
                90deg,
                #7c4dff,
                #651fff
            );

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.03);

            opacity: 0.9;
        }

        .footer {

            margin-top: 20px;

            font-size: 13px;

            color: #9e9e9e;
        }

    </style>

</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <h1>🐱 Cat Facts</h1>

        <div class="subtitulo">
            Curiosidades aleatórias sobre gatos utilizando API pública em tempo real.
        </div>

        <div class="status">
            ● API Online
        </div>

        <div class="card-curiosidade">

            <div class="titulo">
                Curiosidade do Dia
            </div>

            <div id="curiosidade">
                Carregando curiosidade...
            </div>

        </div>

        <button onclick="buscarCuriosidade()">
            🔄 Nova Curiosidade
        </button>

        <div class="footer">
            Projeto desenvolvido para integração de API pública.
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
